<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" role="img" aria-labelledby="socialCardTitle socialCardDesc">
  <title id="socialCardTitle">chatdump social preview</title>
  <desc id="socialCardDesc">A layered badge showing a chat bubble melding into a document, with the chatdump name and tagline.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#fdf8ef" />
      <stop offset="70%" stop-color="#e9e0d1" />
      <stop offset="100%" stop-color="#d7cec2" />
    </linearGradient>
    <linearGradient id="halo" x1="0" y1="0" x2="1" y2="0" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#f7f0e9" />
      <stop offset="48%" stop-color="#fefdf5" />
      <stop offset="100%" stop-color="#d7cec9" />
    </linearGradient>
    <linearGradient id="stream" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#bc8442" />
      <stop offset="70%" stop-color="#3c443b" />
    </linearGradient>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="18" stdDeviation="25" flood-color="#c9b49d" flood-opacity="0.55" />
    </filter>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)" rx="32" />
  <g transform="translate(120 90)">
    <rect width="960" height="450" rx="42" fill="#fff" filter="url(#soft)" />
    <rect x="36" y="40" width="888" height="370" rx="32" fill="url(#halo)" />
    <g transform="translate(80 70)">
      <rect width="360" height="360" rx="32" fill="#faf6f1" stroke="#161310" stroke-opacity="0.25" stroke-width="2" />
      <path d="M92 62H220L276 122V274a26 26 0 0 1-26 26H146l-33 24 6-22a26 26 0 0 1-25-24V88a26 26 0 0 1 26-26Z" fill="#fff" stroke="#161310" stroke-width="3" stroke-linejoin="round" />
      <path d="M305 132c-20-32-38-48-76-60" fill="none" stroke="url(#stream)" stroke-width="24" stroke-linecap="round" />
      <rect x="135" y="180" width="86" height="10" rx="5" fill="#bc8442" />
      <rect x="135" y="204" width="102" height="10" rx="5" fill="#31433a" />
      <rect x="135" y="228" width="78" height="10" rx="5" fill="#31433a" />
      <circle cx="110" cy="132" r="14" fill="#bc8442" />
      <circle cx="146" cy="132" r="14" fill="#bc8442" />
      <circle cx="182" cy="132" r="14" fill="#bc8442" />
    </g>
    <text x="520" y="210" fill="#161310" font-family="'Neue Haas Grotesk Text', 'Segoe UI', sans-serif" font-size="108" font-weight="700" letter-spacing="-4">chatdump</text>
    <text x="520" y="280" fill="#897d70" font-family="'IBM Plex Mono', 'SFMono-Regular', monospace" font-size="30" letter-spacing="0.4em">PUBLIC SHARE EXPORT</text>
    <text x="520" y="350" fill="#31433a" font-family="'Neue Haas Grotesk Text', 'Segoe UI', sans-serif" font-size="44" letter-spacing="-0.03em">Public share link → Markdown</text>
  </g>
</svg>
